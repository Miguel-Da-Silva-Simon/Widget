server.port=8080
server.error.include-message=always

spring.datasource.url=jdbc:postgresql://localhost:5432/clocking
spring.datasource.username=clocking
spring.datasource.password=clocking
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# IANA zone: used for "today" and HH:mm in API responses
app.timezone=Europe/Madrid

# HS256: use a long random secret in production (256+ bits)
jwt.secret=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
jwt.expiration-ms=86400000
